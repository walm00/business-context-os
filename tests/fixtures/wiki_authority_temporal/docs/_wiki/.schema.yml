# Test fixture wiki schema for wiki-authority-temporal plan.
# Starts at 1.1 to exercise the 1.1 -> 1.2 migration recipe.

schema-version: 1.1
last-updated: 2026-05-06

page-types:

  how-to:
    description: "Procedural — steps for accomplishing a task"
    required-fields: [builds-on]
    folder: pages
    review-cadence-days: 180
    auto-archive-after-days: null

  glossary:
    description: "Term definitions"
    required-fields: []
    folder: pages
    review-cadence-days: 365
    auto-archive-after-days: null

  source-summary:
    description: "External capture"
    required-fields: [source-url, last-fetched, detail-level, provenance]
    optional-fields: [etag, last-modified, content-hash]
    folder: source-summary
    review-cadence-days: 90
    auto-archive-after-days: null
    structural-shapes:
      - standalone
      - unified
      - umbrella
      - sub

statuses:
  - draft
  - active
  - under-review
  - archived

detail-levels:
  - brief
  - standard
  - deep

provenance-kinds:
  - url-fetch
  - inbox-promotion
  - local-document

clusters:
  source: docs/document-index.md
  allow-cluster-not-in-source: true

lint-checks:
  citation-coverage:
    severity: ERROR
    scope: all-pages
    description: "Banner citation required"
  schema-violation:
    severity: ERROR
    scope: all-pages
    description: "page-type must be registered; required fields present"
  reference-format-mismatch:
    severity: ERROR
    scope: all-pages
    description: "intra-zone bare slugs; cross-zone paths with .md"
  provenance-required:
    severity: ERROR
    scope: all-pages
    description: "provenance: block required"

auto-fixes: {}

thresholds:
  stale-threshold-days: 30
  graveyard-days: 365
  orphan-grace-days: 365
  fetch-token-guard: 200000

migrations: []
