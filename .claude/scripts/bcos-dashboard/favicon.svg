<?xml version="1.0" encoding="UTF-8"?>
<!--
  Default local-dashboard-builder favicon — a 2x2 grid evoking dashboard
  panels. Brand-neutral charcoal so it reads on both light and dark browser
  chrome. Replace this file to use your own brand mark; server.py serves
  whatever it finds at /favicon.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
     fill="#1c1b1a" aria-hidden="true">
  <rect x="4"  y="4"  width="10" height="10" rx="2"/>
  <rect x="18" y="4"  width="10" height="10" rx="2" opacity="0.55"/>
  <rect x="4"  y="18" width="10" height="10" rx="2" opacity="0.55"/>
  <rect x="18" y="18" width="10" height="10" rx="2"/>
</svg>
