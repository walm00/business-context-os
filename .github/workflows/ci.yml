name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# These checks are advisory — warnings, not blockers.
# They help catch issues during development but should never
# block users who fork or adapt this repo for their own use.

jobs:
  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Validate all JSON files
        run: |
          failed=0
          for f in \
            .claude/quality/ecosystem/state.json \
            .claude/quality/ecosystem/lessons.json \
            .claude/registries/reference-index.json \
            .claude/registries/entities.json \
            .claude/settings.json; do
            if [ -f "$f" ]; then
              if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
                echo "::warning::$f is not valid JSON"
                failed=1
              else
                echo "OK:   $f"
              fi
            else
              echo "SKIP: $f (not found)"
            fi
          done
          exit $failed

  validate-frontmatter:
    name: Validate Frontmatter
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check YAML frontmatter
        run: python3 .claude/scripts/validate_frontmatter.py

  validate-references:
    name: Validate References
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check file path references
        run: python3 .claude/scripts/validate_references.py

  validate-ecosystem:
    name: Validate Ecosystem
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check ecosystem integration
        run: python3 .claude/scripts/analyze_integration.py --ci

  validate-python-shim:
    name: Validate Python shim convention
    runs-on: ubuntu-latest
    # NOT continue-on-error: drift on the shim convention re-creates the
    # Windows MS Store stub failure mode we just fixed. Block it hard.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check that BCOS-controlled files use the shim path
        run: python3 .claude/scripts/check_python_shim_usage.py

  validate-permissions-catalog:
    name: Validate Permissions Catalog
    runs-on: ubuntu-latest
    # Advisory — catalog drift is a framework concern, not user blocker.
    # Bidirectional check: catalog tokens <-> .claude/settings.json
    # permissions.allow. See validate_permissions_catalog.py docstring
    # for matching semantics.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check catalog <-> settings.json drift
        run: python3 .claude/scripts/validate_permissions_catalog.py
